<script>
const dynamicSportsDatabase = {
    "wembanyama": {
        name: "Victor Wembanyama",
        team: "San Antonio Spurs",
        position: "Center / Forward",
        log: "Finals Game 3: Registers a spectacular 29-point baseline performance along with dominant rim protection to break New York's historic undefeated playoff streak on their home court."
    },
    "brunson": {
        name: "Jalen Brunson",
        team: "New York Knicks",
        position: "Point Guard",
        log: "Finals Game 3: Registers 27.3 PPG average metrics across the series, facilitating a late-game fourth-quarter push before falling short at the buzzer."
    },
    "jordan": {
        name: "Michael Jordan",
        team: "Chicago Bulls (Historical Retrospective)",
        position: "Shooting Guard",
        log: "1998 Finals Game 6: Strips possession from Karl Malone in the final seconds and sinks the iconic 20-foot jumper to claim the championship ring."
    }
};

function runArchiveSearch() {
    const userInput = document.getElementById("dbSearch").value.toLowerCase().trim();
    const panelSuccess = document.getElementById("searchSuccess");
    const panelError = document.getElementById("searchError");

    // Hide both panels by default
    panelSuccess.style.display = "none";
    panelError.style.display = "none";

    if (!userInput) return;

    let targetRecord = null;

    // Search matching logic
    if (userInput.includes("wemby") || userInput.includes("victor") || userInput.includes("wembanyama")) {
        targetRecord = dynamicSportsDatabase.wembanyama;
    } else if (userInput.includes("brunson") || userInput.includes("jalen")) {
        targetRecord = dynamicSportsDatabase.brunson;
    } else if (userInput.includes("jordan") || userInput.includes("michael") || userInput.includes("mj")) {
        targetRecord = dynamicSportsDatabase.jordan;
    }

    // Display the results
    if (targetRecord) {
        document.getElementById("resName").textContent = targetRecord.name;
        document.getElementById("resTeam").textContent = targetRecord.team;
        document.getElementById("resPos").textContent = targetRecord.position;
        document.getElementById("resLog").textContent = targetRecord.log;
        panelSuccess.style.display = "block";
    } else {
        panelError.style.display = "block";
    }
}
</script>
</body>
</html>
